name: Build and Publish VPS Image

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: vps-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          image="ghcr.io/${GITHUB_REPOSITORY,,}/sveltekit"
          short_sha="${GITHUB_SHA::7}"
          branch_tag="$(printf '%s' "${GITHUB_REF_NAME}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's#[^a-z0-9_.-]+#-#g; s#^-+##; s#-+$##')"

          if [[ -z "${branch_tag}" ]]; then
            branch_tag="branch"
          fi

          tags=(
            "${image}:branch-${branch_tag}"
            "${image}:branch-${branch_tag}-${short_sha}"
          )

          if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            tags+=(
              "${image}:latest"
              "${image}:main-${short_sha}"
            )
          fi

          {
            echo "image=${image}"
            echo "tags<<EOF"
            printf '%s\n' "${tags[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
