name: Build and Publish VPS Image

on:
  workflow_run:
    workflows:
      - Deploy to GitHub Pages
    types:
      - completed
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build. Defaults to main.
        required: false
        default: main

permissions:
  contents: read
  packages: write

concurrency:
  group: vps-image-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || inputs.ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  docker:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || inputs.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          image="ghcr.io/${GITHUB_REPOSITORY,,}/sveltekit"
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_run" ]]; then
            source_sha="${{ github.event.workflow_run.head_sha }}"
            source_ref="${{ github.event.workflow_run.head_branch }}"
          else
            source_sha="$(git rev-parse HEAD)"
            source_ref="${{ inputs.ref }}"
          fi

          short_sha="${source_sha::7}"
          branch_tag="$(printf '%s' "${source_ref}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's#[^a-z0-9_.-]+#-#g; s#^-+##; s#-+$##')"

          if [[ -z "${branch_tag}" ]]; then
            branch_tag="branch"
          fi

          tags=(
            "${image}:branch-${branch_tag}"
            "${image}:branch-${branch_tag}-${short_sha}"
          )

          if [[ "${source_ref}" == "main" ]]; then
            tags+=(
              "${image}:latest"
              "${image}:main-${short_sha}"
            )
          fi

          {
            echo "image=${image}"
            echo "source_sha=${source_sha}"
            echo "tags<<EOF"
            printf '%s\n' "${tags[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            CAMBERMAST_DEPLOY_SHA=${{ steps.meta.outputs.source_sha }}
