name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '30 8 * * *'  # 12:30 AM PDT (when daylight saving time is in effect).
    - cron: '30 9 * * *'  # 12:30 AM PST (when standard time is in effect).
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Fetch repository contents
      - uses: actions/checkout@v5

      # Prepare Node.js and npm cache
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      # Install dependencies and build static site
      - run: npm ci
        working-directory: web

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('web/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - run: npm exec playwright install --with-deps chromium
        working-directory: web
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ runner.temp }}/ms-playwright

      - run: npm run build
        working-directory: web
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ runner.temp }}/ms-playwright

      # Write the commit SHA into the artifact so production can be verified
      - name: Stamp build with commit SHA
        run: echo "$GITHUB_SHA" > build/deploy-sha.txt
        working-directory: web

      # Package the static site the same way as GitHub's Pages artifact wrapper,
      # but upload it with the Node 24-based upload-artifact action directly.
      - name: Archive GitHub Pages artifact
        run: |
          set -euo pipefail
          tar \
            --dereference --hard-dereference \
            --directory web/build \
            -cvf "$RUNNER_TEMP/artifact.tar" \
            --exclude=.git \
            --exclude=.github \
            --exclude=".[^/]*" \
            .

      - name: Upload GitHub Pages artifact
        uses: actions/upload-artifact@v6
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          retention-days: 1
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # Publish the artifact to GitHub Pages
      - id: deployment
        uses: actions/deploy-pages@v4
